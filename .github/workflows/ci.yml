name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentris_app
          POSTGRES_PASSWORD: sentris_dev_password
          POSTGRES_DB: sentris
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sentris_app -d sentris"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Mypy
        run: mypy app
      - name: Run migrations
        env:
          DATABASE_MIGRATOR_URL: postgresql+asyncpg://sentris_app:sentris_dev_password@localhost:5432/sentris
        run: alembic upgrade head
      - name: Seed MITRE reference data
        env:
          DATABASE_URL: postgresql+asyncpg://sentris_app:sentris_dev_password@localhost:5432/sentris
        run: python -m app.db.seeds.seed_mitre
      - name: Seed RBAC reference data
        env:
          DATABASE_URL: postgresql+asyncpg://sentris_app:sentris_dev_password@localhost:5432/sentris
        run: python -m app.db.seeds.seed_rbac
      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://sentris_app:sentris_dev_password@localhost:5432/sentris
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: pytest --cov=app --cov-report=term-missing

  frontend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: ESLint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Vitest
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: prod
          push: false
          tags: sentris-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          target: prod
          push: false
          tags: sentris-frontend:ci
      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: sentris-backend:ci
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: sentris-frontend:ci
          severity: CRITICAL,HIGH
          exit-code: "0"
